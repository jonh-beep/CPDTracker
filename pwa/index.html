<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CPD Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CPD">
  <link rel="apple-touch-icon" href="icon-180.png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #1a56db 0%, #1e3a8a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 20px) env(safe-area-inset-right) max(env(safe-area-inset-bottom), 20px) env(safe-area-inset-left);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .icon {
      width: 88px;
      height: 88px;
      background: white;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .icon svg { width: 52px; height: 52px; }

    h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.70;
      margin-bottom: 52px;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      color: #1a56db;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.20);
      transition: transform 0.12s ease, opacity 0.12s ease;
      -webkit-appearance: none;
    }

    .open-btn[aria-disabled="true"] {
      background: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
      cursor: not-allowed;
    }

    .open-btn:not([aria-disabled="true"]):active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 0;
    }

    .loading.visible { display: flex; }
    .open-btn.hidden { display: none; }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-text {
      font-size: 14px;
      opacity: 0.65;
    }

    .hint {
      margin-top: 32px;
      font-size: 12px;
      opacity: 0.45;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="icon">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="6" width="28" height="36" rx="4" fill="#1a56db"/>
      <rect x="15" y="14" width="18" height="2.5" rx="1.25" fill="white"/>
      <rect x="15" y="20" width="18" height="2.5" rx="1.25" fill="white"/>
      <rect x="15" y="26" width="12" height="2.5" rx="1.25" fill="white"/>
      <circle cx="35" cy="35" r="8" fill="#22c55e"/>
      <path d="M31 35l2.5 2.5L39 32" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>CPD Tracker</h1>
  <p class="subtitle">Continuing Professional Development</p>

  <a id="openBtn" class="open-btn" href="#" aria-disabled="true">Open Tracker</a>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <span class="loading-text">Opening your tracker…</span>
  </div>

  <p class="hint" id="hint">Sign in with Google if prompted on first launch</p>

  <script src="config.local.js" onerror="this.dataset.missing='1'"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(function() {});
    }

    var btn = document.getElementById('openBtn');
    var loading = document.getElementById('loading');
    var hint = document.getElementById('hint');
    var url = window.CPD_TRACKER_CONFIG && window.CPD_TRACKER_CONFIG.webAppUrl;

    if (url) {
      btn.href = url;
      btn.removeAttribute('aria-disabled');
      btn.addEventListener('click', function() {
        btn.classList.add('hidden');
        loading.classList.add('visible');
        hint.style.opacity = '0';
      });
    } else {
      hint.textContent = 'config.local.js missing — copy config.example.js, fill in webAppUrl, reload.';
      hint.style.opacity = '0.85';
    }
  </script>
</body>
</html>
